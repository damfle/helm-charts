# Default values for mcp-luanti Web Client UI
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

generic:
  # Image configuration
  image:
    repository: git.flety.net/damien/mcp-luanti/gateway
    pullPolicy: IfNotPresent
    tag: "latest" # Must be explicit for dependency charts

  # Replica count
  replicaCount: 1

  args:
    - --port=8765
    - --host=0.0.0.0
    - --debug

  # Service configuration
  service:
    type: ClusterIP
    port: 8765
    targetPort: 8765

  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8765
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: 8765

  # Resource limits and requests
  resources:
    limits:
      cpu: 100m
      memory: 256Mi
    requests:
      cpu: 10m
      memory: 64Mi

  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # Ingress configuration
  ingress:
    enabled: true
    className: ""
    annotations: {}
      # traefik.ingress.kubernetes.io/router.entrypoints: websecure
      # traefik.ingress.kubernetes.io/router.tls: "true"
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # traefik.ingress.kubernetes.io/router.middlewares: authentik-ak-outpost-authentik-embedded-outpost@kubernetescrd
    hosts:
      - host: mcp-luanti.example.com # Change this to your domain
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # Service account configuration
  serviceAccount:
    create: false
    annotations: {}
    name: ""

  # Pod annotations
  podAnnotations: {}

  # Pod security context
  podSecurityContext:
    fsGroup: 0

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity
  affinity: {}

  # Persistence (usually not needed for UI)
  persistence:
    enabled: false
