# Default values for mlflowtoprom URL shortener
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

generic:
  # Image configuration
  image:
    repository: git.flety.net/vibe/mlflowtoprom
    pullPolicy: IfNotPresent
    tag: "0.1.2" # Must be explicit for dependency charts

  # Replica count
  replicaCount: 1

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  # Resource limits and requests
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 32Mi

  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # Ingress configuration
  ingress:
    enabled: false

  # Service account configuration
  serviceAccount:
    create: false
    annotations: {}
    name: ""

  # Pod security context
  podSecurityContext:
    fsGroup: 1000

  livenessProbe:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # This section is for setting up Prometheus ServiceMonitor for monitoring
  # more information can be found here: https://github.com/prometheus-operator/prometheus-operator/blob/main/Documentation/design.md#servicemonitor
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    portName: http

  # Persistence for mlflowtoprom data
  persistence:
    enabled: false
