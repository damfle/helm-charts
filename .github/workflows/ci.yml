name: Continuous Integration

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - main

env:
  HELM_VERSION: v3.13.0
  CHART_TESTING_VERSION: v3.10.1

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      charts-changed: ${{ steps.list-changed.outputs.changed }}
      charts-list: ${{ steps.list-changed.outputs.charts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1
        with:
          version: ${{ env.CHART_TESTING_VERSION }}

      - name: List changed charts
        id: list-changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # For PRs, compare against target branch
            changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          else
            # For pushes to main, check if any chart directories have changes since last commit
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              changed_files=$(git diff --name-only HEAD~1 HEAD)
            else
              # First commit - check all files
              changed_files=$(git ls-files)
            fi
            
            changed=""
            for file in $changed_files; do
              if [[ "$file" =~ ^([^/]+)/(Chart\.yaml|values\.yaml|templates/) ]]; then
                chart_name="${file%%/*}"
                # Verify this is actually a chart directory by checking for Chart.yaml
                if [[ -f "$chart_name/Chart.yaml" ]]; then
                  if [[ ! "$changed" =~ (^|[[:space:]])"$chart_name"([[:space:]]|$) ]]; then
                    changed="${changed}${changed:+ }$chart_name"
                  fi
                fi
              fi
            done
            
            # Fallback: if no charts detected but files changed, find actual chart directories
            if [[ -z "$changed" && -n "$changed_files" ]]; then
              for dir in */; do
                if [[ -f "${dir}Chart.yaml" ]]; then
                  chart_name="${dir%/}"
                  changed="${changed}${changed:+ }$chart_name"
                fi
              done
            fi
          fi
          
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "charts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$changed" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "Detected changed charts: $changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No chart changes detected"
          fi

  lint-and-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.charts-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1
        with:
          version: ${{ env.CHART_TESTING_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          check-latest: true

      - name: Run chart-testing (lint)
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        uses: helm/kind-action@v1.8.0

      - name: Run chart-testing (install)
        run: ct install --target-branch ${{ github.event.repository.default_branch }}

  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: needs.detect-changes.outputs.charts-changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package charts (dry-run)
        run: |
          mkdir -p packages
          
          for chart in ${{ needs.detect-changes.outputs.charts-list }}; do
            echo "Packaging chart: $chart"
            helm package "$chart" --destination packages/
          done
          
          echo "Charts built successfully:"
          ls -la packages/

  build-and-tag:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test, build]
    if: needs.detect-changes.outputs.charts-changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Generate repository version
        id: version
        run: |
          # Get the latest tag
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"
          
          # Extract version number (remove 'v' prefix if present)
          version_number=${latest_tag#v}
          
          # Split version into parts
          IFS='.' read -ra VERSION_PARTS <<< "$version_number"
          major=${VERSION_PARTS[0]:-0}
          minor=${VERSION_PARTS[1]:-0}
          patch=${VERSION_PARTS[2]:-0}
          
          # Increment patch version
          new_patch=$((patch + 1))
          new_version="v${major}.${minor}.${new_patch}"
          
          echo "New repository version: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Increment chart versions and package
        run: |
          mkdir -p packages
          
          for chart in ${{ needs.detect-changes.outputs.charts-list }}; do
            echo "Processing chart: $chart"
            
            # Get current chart version
            current_version=$(helm show chart "$chart" | grep '^version:' | awk '{print $2}')
            echo "Current chart version: $current_version"
            
            # Increment patch version of the chart
            IFS='.' read -ra CHART_VERSION_PARTS <<< "$current_version"
            chart_major=${CHART_VERSION_PARTS[0]:-0}
            chart_minor=${CHART_VERSION_PARTS[1]:-0}
            chart_patch=${CHART_VERSION_PARTS[2]:-0}
            
            new_chart_patch=$((chart_patch + 1))
            new_chart_version="${chart_major}.${chart_minor}.${new_chart_patch}"
            
            echo "New chart version: $new_chart_version"
            
            # Update Chart.yaml version
            sed -i "s/^version: .*/version: ${new_chart_version}/" "$chart/Chart.yaml"
            
            # Verify the change
            updated_version=$(helm show chart "$chart" | grep '^version:' | awk '{print $2}')
            echo "Updated chart version: $updated_version"
            
            # Package the chart with new version
            helm package "$chart" --destination packages/
          done

      - name: Commit version changes and create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add changed Chart.yaml files
          for chart in ${{ needs.detect-changes.outputs.charts-list }}; do
            git add "$chart/Chart.yaml"
          done
          
          # Create commit message
          echo "chore: bump chart versions for release ${{ steps.version.outputs.version }}" > commit-message.txt
          echo "" >> commit-message.txt
          echo "## Changed Charts" >> commit-message.txt
          for chart in ${{ needs.detect-changes.outputs.charts-list }}; do
            chart_name=$(basename "$chart")
            chart_version=$(helm show chart "$chart" | grep '^version:' | awk '{print $2}')
            echo "- $chart_name: v$chart_version" >> commit-message.txt
          done
          
          # Commit the version changes
          git commit -F commit-message.txt
          
          # Create and push tag
          git tag ${{ steps.version.outputs.version }}
          git push origin main
          git push origin ${{ steps.version.outputs.version }}

  trigger-cd:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test, build, build-and-tag]
    if: needs.detect-changes.outputs.charts-changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-and-tag.result == 'success'
    steps:
      - name: Notify CD trigger
        run: |
          echo "🎉 CI Pipeline completed successfully!"
          echo "📦 Tag ${{ needs.build-and-tag.outputs.version }} has been created and pushed"
          echo "🚀 This will automatically trigger the CD (Continuous Deployment) workflow"
          echo "� The CD workflow will:"
          echo "   - Package all charts"
          echo "   - Create GitHub release with artifacts"  
          echo "   - Update Helm repository index"
          echo "   - Deploy to GitHub Pages"
          echo ""
          echo "Monitor the CD workflow at: ${{ github.server_url }}/${{ github.repository }}/actions"

  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test, build, build-and-tag, trigger-cd]
    if: always()
    steps:
      - name: Job Summary
        run: |
          echo "## Helm Charts CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.detect-changes.outputs.charts-changed }}" == "true" ]]; then
            echo "### ✅ Charts Changed" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.detect-changes.outputs.charts-list }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [[ "${{ needs.lint-and-test.result }}" == "success" ]]; then
              echo "### ✅ Lint and Test: Passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ Lint and Test: Failed" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ "${{ needs.build.result }}" == "success" ]]; then
              echo "### ✅ Build: Success" >> $GITHUB_STEP_SUMMARY
            else
              echo "### ❌ Build: Failed" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
              if [[ "${{ needs.build-and-tag.result }}" == "success" ]]; then
                echo "### ✅ Version Bump and Tag: Success" >> $GITHUB_STEP_SUMMARY
                echo "**Version:** ${{ needs.build-and-tag.outputs.version }}" >> $GITHUB_STEP_SUMMARY
                
                if [[ "${{ needs.trigger-cd.result }}" == "success" ]]; then
                  echo "### 🚀 CD Deployment: Automatically triggered by tag creation" >> $GITHUB_STEP_SUMMARY
                  echo "The Continuous Deployment workflow will start shortly to package and deploy the charts." >> $GITHUB_STEP_SUMMARY
                fi
              elif [[ "${{ needs.build-and-tag.result }}" == "failure" ]]; then
                echo "### ❌ Version Bump and Tag: Failed" >> $GITHUB_STEP_SUMMARY
              else
                echo "### ⏭️ Version Bump and Tag: Skipped (no charts changed)" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "### ℹ️ PR Mode: Version bump and tagging skipped" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ℹ️ No charts changed" >> $GITHUB_STEP_SUMMARY
          fi
