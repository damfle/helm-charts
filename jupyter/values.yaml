# Default values for jupyter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Configuration for the generic subchart
generic:
  # Override naming to use "jupyter" instead of "generic"
  nameOverride: "jupyter"

  # Override image settings for jupyter
  image:
    repository: git.flety.net/damien/docker-jupyter
    pullPolicy: IfNotPresent
    tag: "0.1.2" # Must be explicit for dependency charts

  # Service configuration
  service:
    type: ClusterIP
    port: 8888 # jupyter runs on port 8888
    targetPort: http
    protocol: TCP
    portName: http

  # Remove containerPort as it's not supported in current generic chart

  # ServiceAccount configuration
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""

  # Single replica for jupyter
  replicaCount: 1

  # Pod configuration
  podAnnotations: {}
  podLabels: {}
  imagePullSecrets: []

  # Node scheduling
  nodeSelector: {}
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  affinity: {}

  nvidia:
    enabled: true

  # jupyter specific environment variables
  env:
    - name: TZ
      value: "Europe/Paris"
    - name: JUPYTER_ENABLE_LAB
      value: "yes"
    - name: PYTORCH_CUDA_ALLOC_CONF
      value: "expandable_segments:True"
    - name: TOKENIZERS_PARALLELISM
      value: "false"
    - name: HF_DATASETS_CACHE
      value: "/tmp/hf_cache"

  # Configure persistence for jupyter data
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    mountPath: /home/jupyter
    storageClassName: "local-path"
    annotations: {}
    labels: {}

  # Resource limits and requests
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Health checks
  livenessProbe:
    httpGet:
      path: /api
      port: 8888
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api
      port: 8888
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  # ServiceMonitor for Prometheus monitoring (disabled by default)
  serviceMonitor:
    enabled: false
    portName: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

  # Ingress configuration (recommended for external access)
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # For Traefik (as per your setup):
      # traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      # traefik.ingress.kubernetes.io/router.middlewares: authentik-ak-outpost-authentik-embedded-outpost@kubernetescrd
    hosts:
      - host: jupyter.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: jupyter-tls
      #   hosts:
      #     - jupyter.local
