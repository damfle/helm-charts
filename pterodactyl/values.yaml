# Default values for pterodactyl.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count
replicaCount: 1

# This sets the container image
image:
  repository: ghcr.io/pterodactyl/panel
  pullPolicy: IfNotPresent
  tag: "latest"

# This is for the secrets for pulling an image from a private repository
imagePullSecrets: []

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This is for setting Kubernetes Annotations to a Pod.
podAnnotations: {}

# This is for setting Kubernetes Labels to a Pod.
podLabels: {}

# Security context for the pod
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Security context for the container
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# This is for setting up a service
service:
  type: ClusterIP
  port: 80
  targetPort: http
  protocol: TCP
  portName: http

# This block is for setting up the ingress
ingress:
  enabled: false
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
    - host: pterodactyl.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resources configuration
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}

# Service account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# NVIDIA GPU configuration (disabled by default)
nvidia:
  enabled: false

# ServiceMonitor for Prometheus monitoring
serviceMonitor:
  enabled: false
  portName: http
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  labels: {}
  annotations: {}

# ================================================================
# Secrets Configuration
# ================================================================
# Single secret for all components (panel, mariadb, redis)
# Create with: kubectl create secret generic pterodactyl-secrets --from-literal=...
secret:
  name: "pterodactyl-secrets"
  # Keys expected in the secret:
  # - mariadb-root-password
  # - mariadb-password
  # - redis-password (if redis.auth.enabled=true)
  # - db-password (for external database)

# ================================================================
# Database Configuration
# ================================================================
# Set mariadb.enabled: true to deploy embedded MariaDB
# Set mariadb.enabled: false to use external database

mariadb:
  enabled: true
  image:
    repository: mariadb
    pullPolicy: IfNotPresent
    tag: "11"
  imagePullSecrets: []

  replicaCount: 1

  podAnnotations: {}
  podLabels: {}

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false

  env:
    - name: MYSQL_ROOT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "pterodactyl-secrets"
          key: mariadb-root-password
          optional: true
    - name: MYSQL_PASSWORD
      valueFrom:
        secretKeyRef:
          name: "pterodactyl-secrets"
          key: mariadb-password
          optional: true
    - name: MYSQL_DATABASE
      value: "pterodactyl"
    - name: MYSQL_USER
      value: "pterodactyl"

  envFrom: []

  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}
    labels: {}

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# External database configuration (used when mariadb.enabled: false)
# Connects to an external database service
externalDatabase:
  host: "mariadb.databases.svc.cluster.local"
  port: "3306"
  type: "mysql" # mysql or pgsql
  database: "panel"
  username: "pterodactyl"
  # Use secret for password
  password:
    secretKeyRef:
      name: "pterodactyl-secrets"
      key: db-password
      optional: true

# ================================================================
# Redis Configuration
# ================================================================
# Set redis.enabled: true to deploy embedded Redis
# Set redis.enabled: false to use external Redis service

redis:
  enabled: false
  image:
    repository: redis
    pullPolicy: IfNotPresent
    tag: "alpine"
  imagePullSecrets: []

  replicaCount: 1

  port: "6379"

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}

  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false

  # Redis authentication (optional)
  auth:
    enabled: false
    # Use secret for password when enabled
    password:
      secretKeyRef:
        name: "pterodactyl-secrets"
        key: redis-password
        optional: true

  env: []
  envFrom: []

  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    subPath: ""
    annotations: {}
    labels: {}

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# External Redis configuration (used when redis.enabled: false)
externalRedis:
  host: "redis.databases.svc.cluster.local"
  port: "6379"
  # Use secret for password
  password:
    secretKeyRef:
      name: "pterodactyl-secrets"
      key: redis-password
      optional: true

# ================================================================
# Additional Environment Variables for Pterodactyl Panel
# ================================================================
# Add any extra environment variables below
env: []
# Example:
# - name: ADDITIONAL_VAR
#   value: "some_value"

# Environment variables from external sources (Secrets)
envFrom: []
# - secretRef:
#     name: pterodactyl-env-secrets

# ================================================================
# Persistence Configuration for Pterodactyl Panel
# ================================================================

persistence:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  mountPath: /app/var
  subPath: ""
  annotations: {}
  labels: {}

# Additional volumes for Pterodactyl Panel
volumes:
  - name: nginx-config
    emptyDir: {}
  - name: letsencrypt
    emptyDir: {}
  - name: logs
    emptyDir: {}

volumeMounts:
  - name: nginx-config
    mountPath: /etc/nginx/http.d/
  - name: letsencrypt
    mountPath: /etc/letsencrypt/
  - name: logs
    mountPath: /app/storage/logs

# ================================================================
# Health Checks
# ================================================================

livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
