# Default values for pterodactyl.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# ================================================================
# Name Overrides
# ================================================================
nameOverride: ""
fullnameOverride: ""

# ================================================================
# Pterodactyl Configuration
# ================================================================
pterodactyl:
  app:
    # Application URL
    url: "https://pterodactyl.example.com"
    # Environment (production, development, etc.)
    env: "production"
    # Environment only mode
    envOnly: false
    # Timezone
    timezone: "UTC"
    # Admin email for the panel
    adminEmail: "noreply@example.com"

  # Database configuration for Pterodactyl panel
  database:
    # Database name
    name: "pterodactyl"
    # Database host (defaults to embedded mariadb service if empty)
    host: ""
    # Database password
    password: ""
    # Database port
    port: 3306
    # Database user
    user: "pterodactyl"

  # Redis configuration for Pterodactyl panel
  redis:
    # Redis host (defaults to embedded redis service if empty)
    host: ""
    # Redis port
    port: 6379
    # Redis password
    password: ""

  # SMTP configuration for Pterodactyl panel
  smtp:
    # SMTP host
    host: ""
    # SMTP port
    port: 587
    # From email address
    from: "noreply@example.com"
    # SMTP password
    password: ""
    # Enable SSL/TLS
    ssl: false
    # SMTP username
    username: ""

# ================================================================
# Panel Configuration
# ================================================================
panel:
  # Number of panel replicas
  replicaCount: 1

  image:
    # Panel container repository
    repository: ghcr.io/pterodactyl/panel
    # Image pull policy
    pullPolicy: IfNotPresent
    # Panel container tag
    tag: "v1.12.2"

  # Image pull secrets for private registries
  imagePullSecrets: []

  # Pod annotations
  podAnnotations: {}

  # Pod labels
  podLabels: {}

  service:
    # Service type
    type: ClusterIP
    # Service port
    port: 80

  ingress:
    # Enable ingress
    enabled: false
    # Ingress class name
    className: "traefik"
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    hosts:
      - host: pterodactyl.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

  # Node scheduling
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Additional environment variables
  env: []
  # Environment variables from secrets
  envFrom: []

  # Persistence for panel storage
  persistence:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    mountPath: /app/var
    subPath: ""
    annotations: {}
    labels: {}

  # Additional volumes
  volumes: []
  volumeMounts: []

  # Health checks
  livenessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# ================================================================
# MariaDB Configuration
# ================================================================
mariadb:
  # Deploy embedded MariaDB
  enabled: true

  image:
    repository: mariadb
    pullPolicy: IfNotPresent
    tag: "11"

  imagePullSecrets: []

  replicaCount: 1

  podAnnotations: {}
  podLabels: {}

  env: []
  envFrom: []

  persistence:
    size: 1Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations: {}
    labels: {}

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # MariaDB type
  type: "mariadb"
  # Root password for MariaDB (randomly generated if not set)
  rootPassword: ""

# ================================================================
# Redis Configuration
# ================================================================
redis:
  # Deploy embedded Redis
  enabled: false

  image:
    repository: redis
    pullPolicy: IfNotPresent
    tag: "alpine"

  imagePullSecrets: []

  replicaCount: 1

  podAnnotations: {}
  podLabels: {}

  env: []
  envFrom: []

  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    subPath: ""
    annotations: {}
    labels: {}

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Redis authentication (if enabled)
  auth:
    enabled: false
