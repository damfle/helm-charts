{{- if .Values.mariadb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pterodactyl.fullname" . }}-mariadb
  labels:
    {{- include "pterodactyl.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.pterodactyl.database.port }}
      targetPort: mariadb
      protocol: TCP
      name: mariadb
  selector:
    {{- include "pterodactyl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
{{- end }}
