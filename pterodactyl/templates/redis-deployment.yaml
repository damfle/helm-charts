{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pterodactyl.fullname" . }}-redis
  labels:
    {{- include "pterodactyl.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: {{ .Values.redis.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "pterodactyl.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.redis.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pterodactyl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
        {{- with .Values.redis.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.redis.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      podSecurityContext:
        runAsUser: 999
        runAsGroup: 1000
      containers:
        - name: redis
          securityContext:
            runAsUser: 999
            runAsGroup: 1000
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          env:
          {{- with .Values.redis.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.redis.auth.enabled }}
            {{- if .Values.pterodactyl.redis.password }}
            - name: REDIS_PASSWORD
              value: "{{ .Values.pterodactyl.redis.password }}"
            {{- else if .Values.redis.auth.password }}
            - name: REDIS_PASSWORD
              valueFrom: {{- toYaml .Values.redis.auth.password | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.redis.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: redis
              containerPort: {{ .Values.pterodactyl.redis.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: {{ .Values.pterodactyl.redis.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.pterodactyl.redis.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.redis.persistence.enabled }}
            - name: redis-data
              mountPath: /data
              {{- if .Values.redis.persistence.subPath }}
              subPath: {{ .Values.redis.persistence.subPath }}
              {{- end }}
            {{- end }}
      volumes:
        {{- if .Values.redis.persistence.enabled }}
        - name: redis-data
          persistentVolumeClaim:
            claimName: {{ include "pterodactyl.fullname" . }}-redis
        {{- end }}
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
