{{- if and (.Values.mariadb.enabled) (.Values.mariadb.persistence.enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pterodactyl.fullname" . }}-mariadb
  labels:
    {{- include "pterodactyl.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
  {{- with .Values.mariadb.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- range .Values.mariadb.persistence.accessModes }}
    - {{ . | quote }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.mariadb.persistence.size | quote }}
  {{- if .Values.mariadb.persistence.storageClassName }}
  storageClassName: {{ .Values.mariadb.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
