{{- if .Values.mariadb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pterodactyl.fullname" . }}-mariadb
  labels:
    {{- include "pterodactyl.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pterodactyl.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pterodactyl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mariadb
    spec:
      {{- with .Values.mariadb.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      podSecurityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: mariadb
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          env:
            - name: MARIADB_DATABASE
              value: "{{ .Values.pterodactyl.database.name }}"
            - name: MARIADB_USER
              value: "{{ .Values.pterodactyl.database.user }}"
            {{- if .Values.pterodactyl.database.password }}
            - name: MARIADB_PASSWORD
              value: "{{ .Values.pterodactyl.database.password }}"
            {{- else }}
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pterodactyl.fullname" . }}-secrets
                  key: mariadb-password
                  optional: true
            {{- end }}
            {{- if .Values.mariadb.rootPassword }}
            - name: MARIADB_ROOT_PASSWORD
              value: "{{ .Values.mariadb.rootPassword }}"
            {{- else }}
            - name: MARIADB_ROOT_PASSWORD
              value: {{ randAlphaNum 32 | quote }}
            {{- end }}
          {{- with .Values.mariadb.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.mariadb.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: mariadb
              containerPort: {{ .Values.pterodactyl.database.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: {{ .Values.pterodactyl.database.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.pterodactyl.database.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.mariadb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mariadb-data
          persistentVolumeClaim:
            claimName: {{ include "pterodactyl.fullname" . }}-mariadb
      {{- with .Values.mariadb.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mariadb.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mariadb.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
