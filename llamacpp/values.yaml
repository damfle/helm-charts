# Default values for llamacpp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Configuration for the generic subchart
generic:
  # Override naming to use "llamacpp" instead of "generic"
  nameOverride: "llamacpp"

  # Override image settings for llamacpp
  image:
    repository: ghcr.io/ggml-org/llama.cpp
    pullPolicy: IfNotPresent
    tag: "server-cuda-b8864" # Must be explicit for dependency charts

  # Service configuration
  service:
    type: ClusterIP
    port: 8080 # llamacpp runs on port 8888
    targetPort: http
    protocol: TCP
    portName: http

  # Remove containerPort as it's not supported in current generic chart

  # ServiceAccount configuration
  serviceAccount:
    create: false
    automount: true
    annotations: {}
    name: ""

  # Single replica for llamacpp
  replicaCount: 1

  # Pod configuration
  podAnnotations: {}
  podLabels: {}
  imagePullSecrets: []

  # Node scheduling
  nodeSelector: {}

  # NVIDIA GPU configuration
  nvidia:
    enabled: true

  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  affinity: {}

  # llamacpp specific environment variables
  env:
    - name: HOME
      value: "/root/"
    - name: LLAMA_CPP_CACHE_DIR
      value: "/root/.cache/llama.cpp/cache"
    - name: LLAMA_ARG_CTX_SIZE
      value: "262144"
    - name: LLAMA_ARG_HF_REPO
      value: "unsloth/Qwen3.5-9B-GGUF:UD-Q4_K_XL"
    - name: LLAMA_ARG_HOST
      value: "0.0.0.0"
    - name: LLAMA_ARG_PORT
      value: "8080"
    - name: LLAMA_ARG_ENDPOINT_METRICS
      value: "true"
    - name: LLAMA_ARG_MODELS_DIR
      value: "/root/.cache/llama.cpp/models"

  # Configure persistence for llamacpp data
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 30Gi
    mountPath: /root/
    storageClassName: "local-path"
    annotations: {}
    labels: {}

  # Resource limits and requests
  resources: {}

  # Health checks
  livenessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 120
    periodSeconds: 60
    timeoutSeconds: 60
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 120
    periodSeconds: 60
    timeoutSeconds: 60
    failureThreshold: 3

  # Security context
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    fsGroup: 0
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false

  podSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    fsGroup: 0

  # ServiceMonitor for Prometheus monitoring (disabled by default)
  serviceMonitor:
    enabled: true
    portName: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    annotations: {}

  # Ingress configuration (recommended for external access)
  ingress:
    enabled: false
    className: ""
    annotations: {}
      # For Traefik (as per your setup):
      # traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
      # traefik.ingress.kubernetes.io/router.middlewares: authentik-ak-outpost-authentik-embedded-outpost@kubernetescrd
    hosts:
      - host: llamacpp.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
      # - secretName: llamacpp-tls
      #   hosts:
      #     - llamacpp.local
