# Default values for llamacpp.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count
replicaCount: 1

# This sets the container image
image:
  repository: ghcr.io/ggml-org/llama.cpp
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "server-cuda"

# This is for the secrets for pulling an image from a private repository
imagePullSecrets: []

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# Namespace configuration
namespace:
  create: false
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
podLabels: {}

# Security context for the pod
podSecurityContext: {}

# Security context for the container
securityContext: {}

# This is for setting up a service
service:
  # This sets the service type
  type: ClusterIP
  # This sets the ports
  port: 8080

# ServiceMonitor for Prometheus monitoring
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

# Resources configuration
resources: {}

# NVIDIA GPU configuration
nvidia:
  enabled: true

# Environment variables configuration
env:
  - name: HOME
    value: "/workspace"
  - name: LLAMA_CPP_CACHE_DIR
    value: "/workspace/cache"
  - name: LLAMA_ARG_CTX_SIZE
    value: "262144"
  - name: LLAMA_ARG_HF_REPO
    value: "unsloth/Qwen3.5-9B-GGUF:UD-Q4_K_XL"
  - name: LLAMA_ARG_HOST
    value: "0.0.0.0"
  - name: LLAMA_ARG_PORT
    value: "8080"
  - name: LLAMA_ARG_ENDPOINT_METRICS
    value: "true"
  - name: LLAMA_ARG_MODELS_DIR
    value: "/workspace/models"

# Environment variables from external sources (Secrets)
envFrom: []

# This is to setup the liveness and readiness probes
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 1800
  periodSeconds: 30
  timeoutSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5

# Tolerations for GPU nodes
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# Node selector
nodeSelector: {}

# Affinity
affinity: {}

# Persistent Volume Claims configuration
persistence:
  workspace:
    enabled: true
    name: ""
    annotations: {}
    labels: {}
    storageClassName: "local-path"
    accessModes:
      - ReadWriteOnce
    size: 120Gi
    mountPath: /workspace
    subPath: ""
